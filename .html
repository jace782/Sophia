<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>I Love You Sophia Esposito</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #ffdde1, #ee9ca7);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spiral {
      position: relative;
      width: 1200px;
      height: 1200px;
    }

    .phrase {
      position: absolute;
      color: #3b0b2c;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
      transform-origin: center;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="spiral" id="spiral"></div>
  </div>

  <script>
    // List of "I love you, Sophia Esposito" in many languages.
    // Add more lines until you reach 400 if you want.
    const phrases = [
      "English: I love you, Sophia Esposito",
      "Spanish: Te amo, Sophia Esposito",
      "French: Je t’aime, Sophia Esposito",
      "Italian: Ti amo, Sophia Esposito",
      "Portuguese: Eu te amo, Sophia Esposito",
      "German: Ich liebe dich, Sophia Esposito",
      "Russian: Я люблю тебя, София Эспозито",
      "Chinese (Simplified): 我爱你，索菲娅·埃斯波西托",
      "Japanese: ソフィア・エスポジート、愛してる",
      "Korean: 소피아 에스포지토, 사랑해",
      "Arabic: أحبك يا صوفيا إسبوزيتو",
      "Hindi: मैं तुमसे प्यार करता हूँ, सोफिया एस्पोसिटो",
      "Turkish: Seni seviyorum, Sophia Esposito",
      "Greek: Σ’ αγαπώ, Sophia Esposito",
      "Polish: Kocham cię, Sophia Esposito",
      "Dutch: Ik hou van je, Sophia Esposito",
      "Swedish: Jag älskar dig, Sophia Esposito",
      "Norwegian: Jeg elsker deg, Sophia Esposito",
      "Danish: Jeg elsker dig, Sophia Esposito",
      "Finnish: Rakastan sinua, Sophia Esposito",
      "Czech: Miluji tě, Sophia Esposito",
      "Hungarian: Szeretlek, Sophia Esposito",
      "Romanian: Te iubesc, Sophia Esposito",
      "Hebrew: אני אוהב אותך, סופיה אספוזיטו",
      "Thai: ฉันรักคุณ โซเฟีย เอสโปซิโต",
      "Vietnamese: Anh yêu em, Sophia Esposito",
      "Indonesian: Aku mencintaimu, Sophia Esposito",
      "Filipino: Mahal kita, Sophia Esposito",
      "Swahili: Nakupenda, Sophia Esposito",
      "Zulu: Ngiyakuthanda, Sophia Esposito",
      "Xhosa: Ndiyakuthanda, Sophia Esposito",
      "Afrikaans: Ek is lief vir jou, Sophia Esposito",
      "Irish: Tá grá agam duit, Sophia Esposito",
      "Welsh: Rwy’n dy garu di, Sophia Esposito",
      "Catalan: T’estimo, Sophia Esposito",
      "Basque: Maite zaitut, Sophia Esposito",
      "Serbian: Волим те, Sophia Esposito",
      "Croatian: Volim te, Sophia Esposito",
      "Bosnian: Volim te, Sophia Esposito",
      "Slovak: Ľúbim ťa, Sophia Esposito",
      "Ukrainian: Я тебе кохаю, Софія Еспозіто",
      "Belarusian: Я люблю цябе, Софія Эспозіта",
      "Malay: Saya cinta padamu, Sophia Esposito",
      "Persian: سوفیا اسپوزیتو، دوستت دارم",
      "Urdu: میں تم سے محبت کرتا ہوں، صوفیہ ایسپوزیتو",
      "Bengali: আমি তোমাকে ভালোবাসি, সোফিয়া এসপোসিতো",
      "Tamil: நான் உன்னை காதலிக்கிறேன், சோபியா எஸ்போசிடோ",
      "Telugu: నేను నిన్ను ప్రేమిస్తున్నాను, సోఫియా ఎస్పోసిటో",
      "Kannada: ನಾನು ನಿನ್ನನ್ನು ಪ್ರೀತಿಸುತ್ತೇನೆ, ಸೋಫಿಯಾ ಎಸ್ಪೋಸಿಟೋ",
      "Gujarati: હું તને પ્રેમ કરું છું, સોફિયા એસ્પોઝિટો",
      "Marathi: मी तुझ्यावर प्रेम करतो, सोफिया एस्पोसिटो",
      "Punjabi: ਮੈਂ ਤੈਨੂੰ ਪਿਆਰ ਕਰਦਾ ਹਾਂ, ਸੋਫੀਆ ਐਸਪੋਜ਼ੀਟੋ",
      // ...duplicate or add more to reach 400
    ];

    // If you want exactly 400, we can repeat the list:
    const total = 400;
    const list = [];
    for (let i = 0; i < total; i++) {
      list.push(phrases[i % phrases.length] + ` (#${i + 1})`);
    }

    const spiral = document.getElementById("spiral");
    const centerX = 600;
    const centerY = 600;

    // Spiral parameters
    const turns = 6; // how many rotations
    const maxRadius = 500;

    list.forEach((text, index) => {
      const t = index / (list.length - 1); // 0 → 1
      const angle = turns * 2 * Math.PI * t;
      const radius = maxRadius * t;

      const x = centerX + radius * Math.cos(angle);
      const y = centerY + radius * Math.sin(angle);

      const el = document.createElement("div");
      el.className = "phrase";
      el.textContent = text;

      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;

      spiral.appendChild(el);
    });
  </script>
</body>
</html>
